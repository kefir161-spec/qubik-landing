<!--
    Виджет встраивания лендинга Cubik на всю ширину экрана.
    Скопируйте всё содержимое в HTML-блок админки.

    Лендинг растягивается на 100vw (выходит из узкой колонки темы)
    и по высоте подстраивается под весь контент — без «окна» со скроллом внутри.
-->
<div class="cb-embed" data-cb-embed>
    <iframe
        class="cb-embed__frame"
        src="https://kefir161-spec.github.io/qubik-landing/?embed=1"
        title="Cubik — модульная система"
        scrolling="no"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        allowfullscreen
    ></iframe>
</div>

<style>
    .cb-embed {
        position: relative;
        left: 50%;
        right: 50%;
        width: 100vw;
        max-width: 100vw;
        margin-left: -50vw;
        margin-right: -50vw;
        margin-top: 0;
        margin-bottom: 0;
        padding: 0;
        overflow: visible;
        background: #f7fbfa;
        box-sizing: border-box;
    }

    .cb-embed__frame {
        display: block;
        width: 100%;
        height: 7200px;
        min-height: 100vh;
        min-height: 100svh;
        min-height: 100dvh;
        margin: 0;
        padding: 0;
        border: 0;
        background: #f7fbfa;
        overflow: hidden;
    }
</style>

<script>
    (function () {
        var root = document.querySelector('[data-cb-embed]');
        if (!root) return;

        var frame = root.querySelector('.cb-embed__frame');
        if (!frame) return;

        window.addEventListener('message', function (event) {
            if (!event.data || event.data.type !== 'qubik-landing:resize') return;
            var height = Number(event.data.height);
            if (!height || height < 320) return;
            frame.style.height = Math.ceil(height) + 'px';
        });
    })();
</script>
