<!--
    Виджет встраивания лендинга Cubik на полный экран.
    Скопируйте всё содержимое в HTML-блок админки или на страницу сайта.

    URL лендинга: https://kefir161-spec.github.io/qubik-landing/?embed=1
    ?embed=1 — сбрасывает отступы и растягивает hero на всю ширину/высоту iframe.
    ?embed=resize — дополнительно шлёт высоту родителю (см. скрипт ниже).
-->
<div class="cb-embed" data-cb-embed>
    <iframe
        class="cb-embed__frame"
        src="https://kefir161-spec.github.io/qubik-landing/?embed=1"
        title="Cubik — модульная система"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        allowfullscreen
    ></iframe>
</div>

<style>
    .cb-embed {
        --cb-embed-h: 100vh;
        --cb-embed-h: 100svh;
        --cb-embed-h: 100dvh;
        margin: 0;
        padding: 0;
        width: 100%;
        max-width: none;
        height: var(--cb-embed-h);
        min-height: var(--cb-embed-h);
        overflow: hidden;
        background: #f7fbfa;
        box-sizing: border-box;
    }

    .cb-embed__frame {
        display: block;
        width: 100%;
        height: 100%;
        min-height: inherit;
        margin: 0;
        padding: 0;
        border: 0;
        background: #f7fbfa;
    }
</style>

<script>
    (function () {
        var root = document.querySelector('[data-cb-embed]');
        if (!root) return;

        var frame = root.querySelector('.cb-embed__frame');
        if (!frame) return;

        /* Авто-высота: в src iframe добавьте ?embed=resize вместо ?embed=1 */
        window.addEventListener('message', function (event) {
            if (!event.data || event.data.type !== 'qubik-landing:resize') return;
            var height = Number(event.data.height);
            if (!height || height < 320) return;
            root.style.height = height + 'px';
            root.style.minHeight = height + 'px';
            frame.style.height = height + 'px';
        });
    })();
</script>
