<style>
    html,
    body {
        overflow-x: clip !important;
    }

    .cb-embed {
        display: block;
        width: 100vw;
        margin-left: calc(50% - 50vw);
        margin-right: calc(50% - 50vw);
        margin-bottom: 0 !important;
        padding: 0 !important;
        overflow: hidden;
        background: #f7fbfa;
        box-sizing: border-box;
        --cb-header-gap: 0px;
        margin-top: calc(-1 * var(--cb-header-gap)) !important;
    }

    .cb-embed__frame {
        display: block;
        width: 100%;
        height: 8600px;
        margin: 0 !important;
        padding: 0 !important;
        border: 0;
        background: #f7fbfa;
        vertical-align: top;
    }
</style>

<div class="cb-embed" data-cb-embed>
    <iframe
        class="cb-embed__frame"
        src="https://kefir161-spec.github.io/qubik-landing/?embed=1"
        title="Cubik — модульная система"
        scrolling="no"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        allowfullscreen
    ></iframe>
</div>

<script>
    (function () {
        var embed = document.querySelector('[data-cb-embed]');
        var frame = embed && embed.querySelector('.cb-embed__frame');
        if (!frame) return;

        var lastHeight = 0;

        function removeHeaderGap() {
            if (!embed) return;
            var header = document.querySelector('.header, .header_new, header');
            if (!header) return;

            var node = embed.parentElement;
            while (node && node !== document.body) {
                if (parseFloat(getComputedStyle(node).paddingTop) > 0) {
                    node.style.paddingTop = '0';
                }
                node = node.parentElement;
            }

            var gap = embed.getBoundingClientRect().top - header.getBoundingClientRect().bottom;
            if (gap > 0 && gap < 240) {
                embed.style.setProperty('--cb-header-gap', Math.round(gap) + 'px');
            } else if (gap <= 0) {
                embed.style.setProperty('--cb-header-gap', '0px');
            }
        }

        function scheduleGapFix() {
            removeHeaderGap();
            requestAnimationFrame(removeHeaderGap);
        }

        window.addEventListener('message', function (event) {
            if (event.data?.type !== 'qubik-landing:resize') return;
            var height = Number(event.data.height);
            if (!height || height < 800 || height > 12000) return;
            if (Math.abs(height - lastHeight) < 2) return;
            lastHeight = height;
            frame.style.height = Math.ceil(height) + 'px';
        });

        scheduleGapFix();
        window.addEventListener('load', scheduleGapFix);
        window.addEventListener('resize', scheduleGapFix);
        frame.addEventListener('load', scheduleGapFix);
        setTimeout(scheduleGapFix, 300);
        setTimeout(scheduleGapFix, 1200);
    })();
</script>
