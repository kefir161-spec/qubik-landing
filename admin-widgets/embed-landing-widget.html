<!--
    Виджет встраивания лендинга Cubik.
    Скопируйте всё содержимое в HTML-блок админки.
-->
<div class="cb-embed" data-cb-embed>
    <iframe
        class="cb-embed__frame"
        src="https://kefir161-spec.github.io/qubik-landing/?embed=1"
        title="Cubik — модульная система"
        scrolling="no"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        allowfullscreen
    ></iframe>
</div>

<style>
    .cb-embed {
        position: relative;
        left: 50%;
        width: 100vw;
        max-width: 100vw;
        margin-left: -50vw;
        margin-right: -50vw;
        padding: 0;
        overflow: hidden;
        background: #f7fbfa;
        box-sizing: border-box;
    }

    .cb-embed__frame {
        display: block;
        width: 100%;
        height: 8600px;
        margin: 0;
        padding: 0;
        border: 0;
        background: #f7fbfa;
    }
</style>

<script>
    (function () {
        var frame = document.querySelector('[data-cb-embed] .cb-embed__frame');
        if (!frame) return;

        var applied = false;

        window.addEventListener('message', function (event) {
            if (event.data?.type !== 'qubik-landing:resize') return;
            var height = Number(event.data.height);
            if (!height || height < 800 || height > 12000) return;
            if (applied) return;
            applied = true;
            frame.style.height = Math.ceil(height) + 'px';
        });
    })();
</script>
